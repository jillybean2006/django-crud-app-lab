<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#E8F4F8" stroke="#7CB9D4" stroke-width="2"/>
  
  <!-- Jellycat body -->
  <ellipse cx="100" cy="110" rx="45" ry="55" fill="#FF69B4" opacity="0.9"/>
  
  <!-- Jellycat tentacles -->
  <path d="M 75 165 Q 70 180 75 190" stroke="#FF1493" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 100 170 Q 100 185 100 195" stroke="#FF1493" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 125 165 Q 130 180 125 190" stroke="#FF1493" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Left eye -->
  <circle cx="85" cy="95" r="8" fill="#FFFFFF"/>
  <circle cx="85" cy="95" r="5" fill="#000000"/>
  <circle cx="86" cy="93" r="2" fill="#FFFFFF"/>
  
  <!-- Right eye -->
  <circle cx="115" cy="95" r="8" fill="#FFFFFF"/>
  <circle cx="115" cy="95" r="5" fill="#000000"/>
  <circle cx="116" cy="93" r="2" fill="#FFFFFF"/>
  
  <!-- Smile -->
  <path d="M 95 115 Q 100 120 105 115" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Cheeks -->
  <circle cx="70" cy="105" r="6" fill="#FF91D8" opacity="0.6"/>
  <circle cx="130" cy="105" r="6" fill="#FF91D8" opacity="0.6"/>
  
  <!-- Text -->
  <text x="100" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#7CB9D4">
    JellyCat
  </text>
</svg>