{% extends "base.html" %}

{% load static %}
{% block head %}
<link rel='stylesheet' href="{% static 'css/form.css' %}"/>
{% endblock head %}

{% block content %}

<div class="page-header">
    {% if jellycat %}
    <h1>Edit {{jellycat.name}} </h1>
    {% else %}
    <h1>Add a jellycat</h1>
    {% endif %}
    
</div>

<form action="" class="form-container" method="post">
    {% csrf_token %}
    <table>
        {{ form.as_table }}
    </table>
    <button type="submit" class="btn submit">Submit!</button>
</form>

{% endblock content %}
